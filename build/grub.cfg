# AgentOS - GRUB Bootloader Configuration
# Plain text mode — works in VirtualBox and on real hardware.

set default=0
set timeout=10

# Tell GRUB where to find the kernel (required — without this, /casper/vmlinuz is not found)
search --set=root --file /casper/vmlinuz

# ── Boot Entries ──────────────────────────────────────

# Standard install — zero-touch autoinstall via preseed.cfg
menuentry "Install AgentOS v0.1.0" {
    linux   /casper/vmlinuz autoinstall ds=nocloud;s=/cdrom/autoinstall/ ---
    initrd  /casper/initrd
}

# Safe mode — no GPU drivers (use in VM or CPU-only machine)
menuentry "Install AgentOS v0.1.0 (Safe Mode / No GPU)" {
    linux   /casper/vmlinuz autoinstall ds=nocloud;s=/cdrom/autoinstall/ nomodeset AGENTOS_NO_GPU=1 ---
    initrd  /casper/initrd
}

# Manual install — skips autoinstall, shows Ubuntu installer
menuentry "Manual Install (Ubuntu Installer)" {
    linux   /casper/vmlinuz ---
    initrd  /casper/initrd
}
