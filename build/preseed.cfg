#cloud-config
# AgentOS - Autoinstall Configuration
# Ubuntu 22.04 cloud-init autoinstall format
# This file handles the full OS installation with zero user input.
# Docs: https://ubuntu.com/server/docs/install/autoinstall-reference

autoinstall:
  version: 1

  # ── Identity ────────────────────────────────────────
  identity:
    hostname: agentos
    username: agent
    # Password: "agentos"
    # To regenerate: openssl passwd -6 agentos
    password: "$6$agentos$kHBBGjkC4gFOqx6yl7LGJnBUcPXGNGa0rKLMLH9iQWFpTHRb5OZ5EKjNzJgOFfpSSq7XrgFxfcz7e2ELbfK.1"
    realname: "AgentOS User"

  # ── Locale & Keyboard ───────────────────────────────
  locale: en_US.UTF-8
  keyboard:
    layout: us

  # ── Network ─────────────────────────────────────────
  # Use DHCP by default — works on most networks out of the box
  network:
    version: 2
    ethernets:
      any:
        match:
          name: "en*"
        dhcp4: true
        dhcp6: false

  # ── Storage ─────────────────────────────────────────
  # Auto-partition the disk: EFI + root + swap
  storage:
    layout:
      name: lvm
    swap:
      size: 0  # Disable swap (AI workloads prefer RAM, not swap)

  # ── SSH ─────────────────────────────────────────────
  # Enable SSH on first boot so the machine is accessible headlessly
  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  # ── Packages ────────────────────────────────────────
  # Minimal extra packages during install — the AI stack is installed by first-boot.sh
  packages:
    - curl
    - wget
    - git
    - python3
    - python3-pip
    - openssh-server
    - net-tools

  # ── Late Commands ───────────────────────────────────
  # Runs after installation is complete, before first real boot
  late-commands:
    # Copy AgentOS files from ISO to the installed system
    - mkdir -p /target/opt/agentos
    - cp -r /cdrom/agentos/scripts   /target/opt/agentos/
    - cp -r /cdrom/agentos/config    /target/opt/agentos/
    - cp -r /cdrom/agentos/dashboard /target/opt/agentos/
    - cp -r /cdrom/agentos/agents    /target/opt/agentos/

    # Make all scripts executable
    - chmod +x /target/opt/agentos/scripts/*.sh

    # Create the AgentOS log directory
    - mkdir -p /target/var/log/agentos

    # Install the first-boot systemd service (file is in the repo — no heredoc needed)
    - cp /cdrom/agentos/scripts/agentos-first-boot.service /target/etc/systemd/system/
    - curtin in-target --target=/target systemctl enable agentos-first-boot.service

    # Set a nice MOTD so the user knows what this machine is
    - |
      cat > /target/etc/motd << 'EOF'

        █████╗  ██████╗ ███████╗███╗   ██╗████████╗ ██████╗ ███████╗
       ██╔══██╗██╔════╝ ██╔════╝████╗  ██║╚══██╔══╝██╔═══██╗██╔════╝
       ███████║██║  ███╗█████╗  ██╔██╗ ██║   ██║   ██║   ██║███████╗
       ██╔══██║██║   ██║██╔══╝  ██║╚██╗██║   ██║   ██║   ██║╚════██║
       ██║  ██║╚██████╔╝███████╗██║ ╚████║   ██║   ╚██████╔╝███████║
       ╚═╝  ╚═╝ ╚═════╝ ╚══════╝╚═╝  ╚═══╝   ╚═╝    ╚═════╝ ╚══════╝

        Your AI operating system is setting up. Please wait...
        Dashboard will be available at: http://<this-machine-ip>:3000
        Chat UI will be available at:   http://<this-machine-ip>:8080

      EOF

  # ── User Data ───────────────────────────────────────
  # Allow the agent user to run sudo without a password
  # This is needed so first-boot.sh can install packages
  user-data:
    disable_root: false
    users:
      - name: agent
        groups: [sudo, docker]
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        shell: /bin/bash
